<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slop Watch</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <header class="popup__header">
      <h1 class="popup__title">Slop Watch</h1>
      <p class="popup__subtitle">AI content detector</p>
    </header>

    <div class="popup__section popup__section--toggle">
      <label class="toggle" id="master-toggle-label">
        <input type="checkbox" id="master-toggle" checked />
        <span class="toggle__slider"></span>
        <span class="toggle__text">Enabled</span>
      </label>
    </div>

    <div class="popup__controls" id="controls">
      <!-- Hide AI Videos -->
      <div class="popup__section">
        <label class="checkbox-row" id="hide-videos-label">
          <input type="checkbox" id="hide-videos" />
          <span class="checkbox-row__text">Hide AI videos above</span>
        </label>
        <div class="slider-row">
          <input type="range" id="video-threshold" min="10" max="100" step="5" value="75" class="slider" />
          <span class="slider-row__value" id="video-threshold-val">75%</span>
        </div>
      </div>

      <!-- Hide AI Channels -->
      <div class="popup__section">
        <label class="checkbox-row" id="hide-channels-label">
          <input type="checkbox" id="hide-channels" />
          <span class="checkbox-row__text">Hide AI channels above</span>
        </label>
        <div class="slider-row">
          <input type="range" id="channel-threshold" min="10" max="100" step="5" value="75" class="slider" />
          <span class="slider-row__value" id="channel-threshold-val">75%</span>
        </div>
      </div>
    </div>

    <footer class="popup__footer">
      <a href="https://github.com/adityabhandari781/Slop-Watch" target="_blank" rel="noopener noreferrer" class="popup__github" title="View source on GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
